<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Página Personal</title>
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>

<nav>
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">Services</a></li>
    <li><a href="#">About</a></li>
  </ul>
</nav>



<header>
  <h1>Actividad de Clase</h1>
  <p>Proyecto de Clase</p>
</header>

<section>
  <h2>Video de YouTube</h2>

  <iframe width="560"
          height="315"
          src="https://www.youtube.com/embed/W-D0tCwMb2o"
          title="Video de ejemplo"
          frameborder="0"
          allowfullscreen>
  </iframe>
</section>


<section>
  <h2>Tabla de Contenido</h2>

  <table border="1">

    <thead>
    <tr>
      <th>Ahorro</th>
      <th>Fecha</th>
      <th>Razón</th>
    </tr>
    </thead>

    <tbody>
    <tr>
      <td>Universidad</td>
      <td>$50,000</td>
      <td>Pasajes</td>
    </tr>

    <tr>
      <td>Trabajo</td>
      <td>$150,000</td>
      <td>Servicios</td>
    </tr>

    <tr>
      <td>Otros</td>
      <td>$10,000</td>
      <td>Parlays</td>
    </tr>
    </tbody>

  </table>
</section>


<section>
  <h2>Formulario de Contacto</h2>

  <form id="contacto">

    <label>Nombre:</label>
    <input type="text" name="nombre" placeholder="Escribe tu nombre" required>

    <br><br>

    <label>Email:</label>
    <input type="email" name="email" required>

    <br><br>

    <label>Mensaje:</label>
    <textarea name="mensaje" rows="4" cols="30"></textarea>

    <br><br>

    <button type="submit">Enviar</button>

  </form>
</section>

<section>
  <h2>Visita mi GitHub</h2>

  <a href="#">Ir a mi repositorio</a>
</section>

<script src="main.js"></script>

</body>
</html>
